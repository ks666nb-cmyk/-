<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>河北省邢台市中考成绩查询平台</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft YaHei",sans-serif;
}

body{
    background:#f3f4f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
}

.header{
    background:#234c8d;
    color:#fff;
    text-align:center;
    padding:35px 20px;
    font-size:30px;
    font-weight:bold;
}

.content{
    padding:30px;
}

.label{
    font-size:18px;
    margin-bottom:10px;
    color:#333;
}

.input{
    width:100%;
    height:55px;
    border:2px solid #e5e5e5;
    border-radius:12px;
    padding:0 15px;
    font-size:18px;
    margin-bottom:25px;
}

.btn{
    width:100%;
    height:55px;
    border:none;
    border-radius:12px;
    background:#234c8d;
    color:#fff;
    font-size:20px;
    cursor:pointer;
}

.result{
    display:none;
    margin-top:25px;
    background:#f7f9fc;
    border-radius:12px;
    padding:20px;
    line-height:2;
    font-size:18px;
}

.score{
    color:#d81e06;
    font-size:32px;
    font-weight:bold;
}

.tip{
    margin-top:15px;
    color:#888;
    font-size:13px;
}
</style>
</head>
<body>

<div class="card">

    <div class="header">
        中考成绩查询平台
    </div>

    <div class="content">

        <div class="label">考生姓名</div>
        <input id="name" class="input" placeholder="请输入姓名">

        <div class="label">准考证号</div>
        <input id="ticket" class="input" placeholder="请输入准考证号(如：0528*******,)">

        <button class="btn" onclick="query()">
            立即查询成绩
        </button>

        <div id="result" class="result">
            <div>姓名：<span id="showName"></span></div>
            <div>准考证号：<span id="showTicket"></span></div>
            <div>
                模拟成绩：
                <span id="score" class="score"></span>
            </div>

            <div class="tip">
                本页面为KS大牛制造，仅供学习和娱乐，不提供真实中考成绩查询功能。
            </div>
        </div>

    </div>

</div>

<script>
function query(){
    let name = document.getElementById("name").value || "张三";
    let ticket = document.getElementById("ticket").value || "2026000000";

    // 随机生成600~699分
    let score = Math.floor(Math.random() * 100) + 600;

    document.getElementById("showName").innerText = name;
    document.getElementById("showTicket").innerText = ticket;
    document.getElementById("score").innerText = score + "分";

    document.getElementById("result").style.display = "block";
}
</script>

</body>
</html>
